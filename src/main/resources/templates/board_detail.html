<html layout:decorate="~{layout1}">
	<div layout:fragment="content">
		<h1>게시글 상세보기</h1>
		<table>
			<tr>
				<th>글 번호</th>
				<td>[[${dto.bno}]]</td>
			</tr>
			<tr>
				<th>제목</th>
				<td>[[${dto.title}]]</td>
			</tr>
			<tr>
				<th>내용</th>
				<td>[[${dto.content}]]</td>
			</tr>
			<tr>
				<th>작성자</th>
				<td>[[${dto.writer}]]</td>
			</tr>
			<tr>
				<th>작성일시</th>
				<td>[[${dto.writedate}]]</td>
			</tr>
		</table>
		<a th:href="@{|/board/delete/${dto.bno}|}"
			sec:authorize="isAuthenticated()"
			th:if="${dto.getWriter()==#authentication.getPrincipal().getUsername()}">삭제</a>
	</div>
</html>
